<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Souls Of Soulcity - Pro Rankings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root { --f1-red: #e10600; --f1-black: #0b0b0b; --f1-text-dim: #949494; --navbar-h: 80px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--f1-black); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* -------------------- LOGO & NAV -------------------- */
        .logo {
            position: fixed;
            top: 23px;
            left: 40px;
            z-index: 101;
            font-family: "Kaushan Script", sans-serif;
            font-weight: bolder;
            font-size: 24px;
            color: #e4e3d3;
            text-decoration: none;
            transition: 0.3s;
        }

        nav {
            position: fixed;
            top: 30px;
            width: 100%;
            height: var(--navbar-h);
            z-index: 99;
            display: flex;
            align-items: center;
            background-color: transparent;
            transition: all 0.4s ease;
        }

        .nav-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            list-style: none;
            padding: 0 40px;
        }

        .menu { display: flex; list-style: none; }
        .menu li { padding-left: 30px; }
        .menu li a {
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }
        .menu li a:hover { color: var(--f1-red); }

        .open-menu, .close-menu { display: none; color: #fff; cursor: pointer; font-size: 1.5rem; }
        #check { display: none; }

        .dashboard { display: flex; margin-top: var(--navbar-h); min-height: calc(100vh - var(--navbar-h)); }

        /* HERO SECTION */
        .hero-section { flex: 1; padding: 60px; position: sticky; top: var(--navbar-h); height: calc(100vh - var(--navbar-h)); display: flex; flex-direction: column; justify-content: center; }
        .hero-image-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0; filter: grayscale(1); transition: opacity 0.4s ease; }
        .hero-image-container img { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to bottom, black 70%, transparent); }
        .f1-tag { color: var(--f1-red); font-weight: 900; letter-spacing: 2px; font-size: 0.75rem; margin-bottom: 10px; text-transform: uppercase; }
        .hero-section h1 { font-size: 4.5rem; font-weight: 900; line-height: 0.8; text-transform: uppercase; }
        .outline-text { -webkit-text-stroke: 1px white; color: transparent; }

        /* MAIN SECTION */
        .standings-section { flex: 1.8; padding: 40px; border-left: 1px solid #222; }
        .tab-nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #252525; overflow-x: auto; white-space: nowrap; }
        .tab-btn { background: none; border: none; color: var(--f1-text-dim); font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 15px 0; border-bottom: 3px solid transparent; font-size: 12px; letter-spacing: 1px; }
        .tab-btn.active { color: white; border-bottom: 3px solid var(--f1-red); }

        /* TABLES */
        .f1-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .f1-table th { text-align: left; color: var(--f1-text-dim); font-size: 11px; padding: 10px; border-bottom: 1px solid #333; text-transform: uppercase; }
        .f1-table td { padding: 15px 10px; font-size: 14px; border-bottom: 1px solid #222; font-weight: 600; }

        /* BRACKET SYSTEM STYLING */
        .bracket-wrapper { display: flex; gap: 50px; padding: 30px 0; overflow-x: auto; align-items: stretch; min-height: 550px; }
        .round-col { display: flex; flex-direction: column; min-width: 260px; justify-content: space-around; }
        .matchup { position: relative; margin: 15px 0; display: flex; flex-direction: column; gap: 3px; width: 100%; }
        .match-id-tag { font-size: 9px; color: var(--f1-text-dim); font-weight: 800; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;}
        .team-box { background: #111; border: 1px solid #222; padding: 12px 15px; cursor: pointer; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; border-radius: 2px; }
        .team-box:hover { border-color: var(--f1-red); background: #1a1a1a; }
        .team-box.winner { border-left: 4px solid var(--f1-red); background: #141414; }
        .team-box span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* CURRENT ONGOING RACE CARD */
        .live-race-card { background: linear-gradient(135deg, #111 0%, #1c0201 100%); border: 1px solid #333; border-top: 4px solid var(--f1-red); padding: 30px; border-radius: 4px; margin-top: 20px; }
        .live-grid { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-top: 25px; }
        .live-team { flex: 1; background: #000; border: 1px solid #222; padding: 25px; text-align: center; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .live-team:hover { border-color: var(--f1-red); }
        .live-team h3 { font-size: 1.8rem; font-weight: 900; margin-top: 5px; text-transform: uppercase; }
        .vs-circle { background: var(--f1-red); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; box-shadow: 0 0 15px rgba(225,6,0,0.4); }

        /* DETAILS VIEW */
        #details-view { display: none; }
        .back-btn { background: var(--f1-red); color: white; border: none; padding: 10px 20px; font-weight: 800; cursor: pointer; margin-bottom: 20px; text-transform: uppercase; font-size: 12px; border-radius: 2px; }
        .stat-card { background: #0f0f0f; padding: 25px; border: 1px solid #222; margin-top: 20px; border-top: 4px solid var(--f1-red); }

        @media (max-width: 950px) { .dashboard { flex-direction: column; } .hero-section { height: 350px; position: relative; } }
    </style>
</head>
<body>

<a href="index.html" class="logo" id="main-logo">Souls Of Soulcity</a>

<nav id="main-nav">
    <ul class='nav-bar'>
        <input type='checkbox' id='check' />
        <span class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="crews.html">Crews</a></li>
            <li><a href="rankings.html" style="color:var(--f1-red)">Rankings</a></li>
            <li><a href="Watch.html">Watch</a></li>
            <li><a href="login.html">Login</a></li>
            <label for="check" class="close-menu"><i class="fas fa-times"></i></label>
        </span>
        <label for="check" class="open-menu"><i class="fas fa-bars"></i></label>
    </ul>
</nav>

<div class="dashboard">
    <aside class="hero-section">
        <div class="hero-image-container" id="hero-container"><img src="" id="hero-img"></div>
        <div class="f1-tag" id="hero-tag">Tournament Rankings</div>
        <div id="hero-name-container">
            <h1 id="hero-first">SELECT</h1>
            <h1 class="outline-text" id="hero-last">A TEAM</h1>
        </div>
    </aside>

    <main class="standings-section">
        <div id="navigation-container">
            <div class="tab-nav">
                <button class="tab-btn active" id="btn-currentRace" onclick="switchTab('currentRace')">Current Race</button>
                <button class="tab-btn" id="btn-winners" onclick="switchTab('winners')">Winners Bracket</button>
                <button class="tab-btn" id="btn-losers" onclick="switchTab('losers')">Losers Bracket</button>
            </div>

            <!-- TAB CONTAINER: CURRENT LIVE ONGOING RACE -->
            <div id="currentRace-container" class="tab-content">
                <div class="live-race-card" id="live-race-render" onmouseleave="resetHero()">
                    <!-- Rendered dynamically by JS -->
                </div>
            </div>

            <!-- TAB CONTAINER: WINNER BRACKET MAP -->
            <div id="winners-container" class="tab-content" style="display:none">
                <div class="bracket-wrapper" id="winner-bracket-render" onmouseleave="resetHero()"></div>
            </div>

            <!-- TAB CONTAINER: LOSER BRACKET MAP -->
            <div id="losers-container" class="tab-content" style="display:none">
                <div class="bracket-wrapper" id="loser-bracket-render" onmouseleave="resetHero()"></div>
            </div>
        </div>

        <!-- DETAILS WRAPPER VIEW -->
        <div id="details-view">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
            <div id="details-title"></div>
            <div class="stat-card">
                <h4 class="f1-tag" id="performance-label">Racer Performance Breakdown</h4>
                <div style="overflow-x: auto;">
                    <table class="f1-table">
                        <thead><tr id="details-headers"></tr></thead>
                        <tbody id="details-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const BASE_GID = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4ud-4K7CF0Xdi3VK3Snca_xV9huBCAg--xoRyhPVuCxfI6yzuD3ZSsuVngiRJQ_KfXXZRBfJzG5Kq/pub?';
    const CONFIG = {
        bracketStats: BASE_GID + 'gid=1780190838&single=true&output=csv',
        bracketMap: BASE_GID + 'gid=1780190838&single=true&output=csv'
    };

    let dataStore = { bracketStats: [], winners: [], losers: [], currentRace: null };
    let activeTab = 'currentRace';

    async function init() {
        await Promise.all([
            loadSheet('bracketStats', CONFIG.bracketStats),
            loadBracketsAndLive(CONFIG.bracketMap)
        ]);
        renderDoubleEliminationBrackets();
        renderCurrentRace();
    }

    async function loadSheet(key, url) {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g, '')));
            const headers = rows[0];
            const crewIdx = 1, racerIdx = 3, ptsIdx = 4;
            const tableHeaders = headers.filter(h => !['Image', 'Crew Name', 'ID', ''].includes(h));

            let crews = [];
            let current = null;

            rows.slice(1).forEach(r => {
                if (r[crewIdx] && r[crewIdx] !== "") {
                    current = { name: r[crewIdx], total: 0, image: r[0] || '', racers: [], headers: tableHeaders, source: key };
                    crews.push(current);
                }
                if (current && r[racerIdx] && r[racerIdx] !== "") {
                    let rData = {};
                    headers.forEach((h, i) => rData[h] = r[i] || "0");
                    current.racers.push(rData);
                    current.total += parseFloat(r[ptsIdx]) || 0;
                }
            });
            dataStore[key] = crews;
        } catch(e) { console.error("Load error", key, e); }
    }

    async function loadBracketsAndLive(url) {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.trim().replace(/"/g, '')));

            let winnersMap = {};
            let losersMap = {};

            rows.slice(1).forEach((r, idx) => {
                if (!r[0]) return;

                const roundName = r[0].trim();
                const t1 = r[1] || "TBD";
                const t2 = r[2] || "TBD";
                const winner = r[3] || "";
                const isLive = r[4] ? r[4].toLowerCase().trim() === "true" : false;

                const matchObj = { id: `M-${idx+1}`, t1, t2, winner };

                if (isLive) {
                    dataStore.currentRace = matchObj;
                }

                if (roundName.toLowerCase().includes('loser') || roundName.toLowerCase().includes('lq')) {
                    if (!losersMap[roundName]) losersMap[roundName] = { round: roundName, matches: [] };
                    losersMap[roundName].matches.push(matchObj);
                } else {
                    if (!winnersMap[roundName]) winnersMap[roundName] = { round: roundName, matches: [] };
                    winnersMap[roundName].matches.push(matchObj);
                }
            });

            dataStore.winners = Object.values(winnersMap);
            dataStore.losers = Object.values(losersMap);
        } catch(e) { console.error("Double elimination allocation parsing error", e); }
    }

    function resetHero() {
        document.getElementById('hero-tag').innerText = "Tournament Rankings";
        document.getElementById('hero-first').innerText = "SELECT";
        document.getElementById('hero-last').innerText = "A TEAM";
        gsap.to("#hero-container", { opacity: 0, duration: 0.3 });
    }

    function previewTeam(teamName) {
        if (!teamName || teamName.toLowerCase() === "tbd") return;
        let team = dataStore.bracketStats.find(t => t.name.toLowerCase() === teamName.toLowerCase());
        if (!team) return;

        const [first, ...last] = team.name.split(' ');
        document.getElementById('hero-first').innerText = first;
        document.getElementById('hero-last').innerText = last.join(' ') || 'TEAM';
        if (team.image) {
            document.getElementById('hero-img').src = team.image;
            gsap.to("#hero-container", { opacity: 0.7, duration: 0.4 });
        }
    }

    function showTeamDetails(teamName) {
        if (!teamName || teamName.toLowerCase() === "tbd") return;
        let team = dataStore.bracketStats.find(t => t.name.toLowerCase() === teamName.toLowerCase());
        if (!team) return;

        document.getElementById('navigation-container').style.display = 'none';
        document.getElementById('details-view').style.display = 'block';
        document.getElementById('details-title').innerHTML = `
            <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px;">
                <h1 style="font-size: 3.2rem; font-weight: 900; text-transform: uppercase;">${team.name}</h1>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div style="flex-grow: 1; height: 3px; background: linear-gradient(90deg, var(--f1-red), transparent);"></div>
                    <span style="font-size: 1.6rem; font-weight: 900;">${team.total} PTS</span>
                </div>
            </div>`;

        document.getElementById('details-headers').innerHTML = team.headers.map(h => `<th>${h}</th>`).join('');
        document.getElementById('details-body').innerHTML = team.racers.map(r => `
            <tr>${team.headers.map(h => `<td>${r[h] || '0'}</td>`).join('')}</tr>
        `).join('');
    }

    function renderCurrentRace() {
        const target = document.getElementById('live-race-render');
        if(!dataStore.currentRace) {
            target.innerHTML = `
                <div class="f1-tag">Live Status Update</div>
                <h2 style="font-weight:900; text-transform:uppercase; margin-top:10px;">No Ongoing Track Battles Scheduled</h2>
                <p style="color: var(--f1-text-dim); margin-top:5px; font-size:13px;">Check back once next race cycle initiates.</p>
            `;
            return;
        }

        const { t1, t2, id } = dataStore.currentRace;
        target.innerHTML = `
            <div class="f1-tag"><i class="fas fa-circle-dot" style="color:var(--f1-red); margin-right:5px; animation: blink 1.5s infinite;"></i> Grid Battle Session - ${id}</div>
            <h2 style="font-weight:900; font-size:2rem; text-transform:uppercase;">Currently Live on Asphalt</h2>

            <div class="live-grid">
                <div class="live-team" onmouseenter="previewTeam('${t1}')" onclick="showTeamDetails('${t1}')">
                    <span class="f1-tag" style="color:var(--f1-text-dim)">Seed Contender A</span>
                    <h3>${t1}</h3>
                </div>
                <div class="vs-circle">VS</div>
                <div class="live-team" onmouseenter="previewTeam('${t2}')" onclick="showTeamDetails('${t2}')">
                    <span class="f1-tag" style="color:var(--f1-text-dim)">Seed Contender B</span>
                    <h3>${t2}</h3>
                </div>
            </div>
        `;
    }

    function renderDoubleEliminationBrackets() {
        document.getElementById('winner-bracket-render').innerHTML = generateBracketHTML(dataStore.winners);
        document.getElementById('loser-bracket-render').innerHTML = generateBracketHTML(dataStore.losers);
    }

    function generateBracketHTML(bracketData) {
        if(bracketData.length === 0) {
            return `<div style="color:var(--f1-text-dim); padding:20px; font-weight:600;">No structural matchups recorded for this ladder.</div>`;
        }
        return bracketData.map(round => `
            <div class="round-col">
                <div class="f1-tag" style="text-align:center; padding-bottom: 20px; border-bottom:1px dashed #222; margin-bottom:15px;">${round.round}</div>
                ${round.matches.map(m => `
                    <div class="matchup">
                        <span class="match-id-tag">${m.id}</span>
                        <div class="team-box ${m.winner === m.t1 && m.t1 !== 'TBD' ? 'winner' : ''}" onmouseenter="previewTeam('${m.t1}')" onclick="showTeamDetails('${m.t1}')">
                             <span>${m.t1}</span> ${m.winner === m.t1 && m.t1 !== 'TBD' ? '<i class="fas fa-trophy" style="color:#e10600; font-size:12px;"></i>' : ''}
                        </div>
                        <div class="team-box ${m.winner === m.t2 && m.t2 !== 'TBD' ? 'winner' : ''}" onmouseenter="previewTeam('${m.t2}')" onclick="showTeamDetails('${m.t2}')">
                             <span>${m.t2}</span> ${m.winner === m.t2 && m.t2 !== 'TBD' ? '<i class="fas fa-trophy" style="color:#e10600; font-size:12px;"></i>' : ''}
                        </div>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    function goBack() {
        document.getElementById('details-view').style.display = 'none';
        document.getElementById('navigation-container').style.display = 'block';
        resetHero();
    }

    window.switchTab = (key) => {
        activeTab = key;
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`${key}-container`).style.display = 'block';
        document.getElementById(`btn-${key}`).classList.add('active');
        resetHero();
    };

    init();
</script>

<style>
    @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
</style>
</body>
</html>
