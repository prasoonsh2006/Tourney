<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Souls Of Soulcity - Live Auction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* ... [PASTE YOUR ROOT, NAV, AND AUCTION-CONTAINER CSS HERE] ... */
        :root { --f1-red: #e10600; --f1-black: #0b0b0b; --f1-dark-grey: #151515; --f1-text-dim: #949494; --navbar-h: 80px; }
        body { background-color: var(--f1-black); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .logo { position: fixed; top: 23px; left: 40px; z-index: 101; font-family: "Kaushan Script", sans-serif; font-size: 24px; color: #e4e3d3; text-decoration: none; }
        nav { position: fixed; top: 0; width: 100%; height: var(--navbar-h); background: rgba(11, 11, 11, 0.9); backdrop-filter: blur(10px); z-index: 99; display: flex; align-items: center; justify-content: flex-end; padding: 0 40px; border-bottom: 1px solid #252525; }
        .menu { display: flex; list-style: none; gap: 30px; }
        .menu li a { color: #fff; text-decoration: none; text-transform: uppercase; font-size: 13px; font-weight: 600; }
        .auction-container { max-width: 1400px; margin: calc(var(--navbar-h) + 40px) auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        .active-racer-card { background: var(--f1-dark-grey); border-radius: 20px; padding: 40px; display: flex; gap: 40px; border: 1px solid #252525; position: relative; overflow: hidden; }
        .racer-image img { width: 100%; height: 500px; object-fit: cover; border-radius: 15px; border-left: 4px solid var(--f1-red); }
        .amount { font-size: 3.8rem; font-weight: 900; color: var(--f1-red); display: block; line-height: 1; }
        .bid-input-wrapper { display: flex; gap: 10px; background: #222; padding: 8px; border-radius: 12px; border: 1px solid #333; }
        .bid-input { background: transparent; border: none; color: white; font-size: 1.3rem; font-weight: 800; width: 100%; outline: none; padding-left: 15px; }
        .place-bid-btn { background: var(--f1-red); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .sidebar-panel { background: var(--f1-dark-grey); border: 1px solid #252525; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .history-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .progress-track { width: 100%; height: 3px; background: #252525; }
        .progress-fill { height: 100%; width: 100%; background: var(--f1-red); transition: width 1s linear; }
        .critical-time { color: var(--f1-red) !important; animation: blink 0.8s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<a href="index.html" class="logo">Souls Of Soulcity</a>
<nav><ul class="menu"><li><a href="index.html">Home</a></li><li><a href="#" style="color:var(--f1-red)">Auction</a></li></ul></nav>

<div class="auction-container">
    <main class="active-racer-card">
        <div class="racer-image"><img id="racer-img" src=""></div>
        <div class="bid-details">
            <div class="timer-status-bar">
                <div class="timer-top-info flex justify-between">
                    <span class="text-xs uppercase font-bold text-gray-500">Time Left</span>
                    <span id="auction-timer" class="font-mono font-bold">00:00</span>
                </div>
                <div class="progress-track"><div class="progress-fill" id="timer-bar"></div></div>
            </div>
            <h1 id="racer-name">WAITING...</h1>
            <div class="current-bid-box">
                <span class="label">Highest Bid</span>
                <span class="amount" id="display-bid">0 SVC</span>
            </div>
            <p id="racer-desc" style="color:var(--f1-text-dim); margin-bottom: 25px; font-size: 0.85rem;"></p>
            <div class="bid-input-wrapper">
                <input type="number" class="bid-input" id="user-bid">
                <button class="place-bid-btn" id="bid-btn">Place Bid</button>
            </div>
        </div>
    </main>

    <aside>
        <div class="sidebar-panel">
            <div class="panel-header">Your Team Wallet</div>
            <div class="flex justify-between items-center">
                <span id="my-team" class="font-bold text-sm uppercase">--</span>
                <span id="my-balance" class="text-green-400 font-mono">0 SVC</span>
            </div>
        </div>
        <div class="sidebar-panel">
            <div class="panel-header">Bid History</div>
            <div id="history-box"></div>
        </div>
    </aside>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, runTransaction, Timestamp, collection, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUserId, currentTeam, auctionEnd;

    // 1. AUTHENTICATION & WALLET
    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = "login.html";
        currentUserId = user.uid;
        onSnapshot(doc(db, "teams", user.uid), (snap) => {
            if(snap.exists()){
                currentTeam = snap.data();
                document.getElementById('my-team').innerText = currentTeam.teamName;
                document.getElementById('my-balance').innerText = currentTeam.balance.toLocaleString() + " SVC";
            }
        });
    });

    // 2. LIVE AUCTION LISTENER
    onSnapshot(doc(db, "auctionState", "current"), (snap) => {
        const data = snap.data();
        if (!data) return;

        document.getElementById('racer-name').innerText = data.name;
        document.getElementById('display-bid').innerText = data.highestBid.toLocaleString() + " SVC";
        document.getElementById('user-bid').value = data.highestBid + 500;
        auctionEnd = data.endTime.toMillis();

        // Get Racer Details for Image/Desc
        onSnapshot(doc(db, "racers", data.racerId), (rSnap) => {
            const r = rSnap.data();
            document.getElementById('racer-img').src = r.imageUrl;
            document.getElementById('racer-desc').innerText = r.description;
        });
    });

    // 3. TIMER
    setInterval(() => {
        if (!auctionEnd) return;
        const now = Date.now();
        const diff = Math.max(0, Math.floor((auctionEnd - now) / 1000));
        const timerText = document.getElementById('auction-timer');
        const timerBar = document.getElementById('timer-bar');

        timerText.innerText = `00:${diff < 10 ? '0' + diff : diff}`;
        timerBar.style.width = (diff / 60) * 100 + '%';

        if (diff <= 10) timerText.classList.add('critical-time');
        else timerText.classList.remove('critical-time');

        document.getElementById('bid-btn').disabled = (diff <= 0);
        if(diff <= 0) document.getElementById('bid-btn').innerText = "SOLD";
    }, 1000);

    // 4. BIDDING ACTION
    document.getElementById('bid-btn').onclick = async () => {
        const amount = parseInt(document.getElementById('user-bid').value);
        try {
            await runTransaction(db, async (transaction) => {
                const aRef = doc(db, "auctionState", "current");
                const aSnap = await transaction.get(aRef);
                const currentBid = aSnap.data().highestBid;

                if (amount <= currentBid) throw "Bid higher!";
                if (amount > currentTeam.balance) throw "No SVC!";

                transaction.update(aRef, {
                    highestBid: amount,
                    highestBidderId: currentUserId,
                    highestBidderName: currentTeam.teamName,
                    endTime: Timestamp.fromMillis(Date.now() + 15000) // Adds 15s (Antisnipe)
                });
            });
        } catch (e) { alert(e); }
    };
</script>
</body>
</html>
