<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #36393f; /* Discord Dark Theme */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #2f3136;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            width: 350px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #b9bbbe; margin-bottom: 30px; }
        .btn-discord {
            background-color: #5865F2;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-discord:hover {
            background-color: #4752c4;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Members Only</h1>
    <p>You must be a member of our Discord server to access this site.</p>
    <a href="/login" class="btn-discord">Login with Discord</a>
</div>
</body>
</html>
